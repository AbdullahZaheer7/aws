<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - CodeCrafters</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; }
        nav { background: #2c3e50; padding: 10px; color: white; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        .container { max-width: 800px; margin: 20px auto; }
        .panel { border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
        label { display:block; margin-top: 12px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 120px; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 16px; cursor: pointer; border-radius: 6px; margin-top: 14px; }
        .btn:hover { background: #2980b9; }
        .status { margin-top: 12px; padding: 10px; border-radius: 6px; display:none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="downloads.html">Downloads</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <h1>Contact Us</h1>
        <p class="muted" style="color:#666;">Send a message and we’ll get back to you as soon as possible.</p>

        <div class="panel">
            <form id="contactForm" novalidate>
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Your name" required />

                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required />

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message..." required></textarea>

                <button class="btn" type="submit">Send Message</button>
                <div id="status" class="status"></div>
            </form>
        </div>

        <div style="margin-top:16px; color:#666; font-size: 0.95em;">
            <strong>Note:</strong> This is a front-end demo form (no backend connected). It validates input and shows a confirmation message.
        </div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const statusDiv = document.getElementById('status');

        function setStatus(message, type) {
            statusDiv.style.display = 'block';
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type) statusDiv.classList.add(type);
        }

        function isValidEmail(email) {
            // Simple email pattern suitable for client-side validation.
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!name) {
                setStatus('❌ Please enter your name.', 'error');
                return;
            }

            if (!email || !isValidEmail(email)) {
                setStatus('❌ Please enter a valid email address.', 'error');
                return;
            }

            if (!message || message.length < 10) {
                setStatus('❌ Message must be at least 10 characters.', 'error');
                return;
            }

            // Front-end confirmation (no backend)
            setStatus('✅ Thanks! Your message has been sent (demo).', 'success');
            form.reset();
        });
    </script>
</body>
</html>
