<!DOCTYPE html>
<html>
<head>
    <title>Projects - CodeCrafters</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        /* Same styles as index.html plus: */
        .document { border: 1px solid #ddd; padding: 15px; margin: 10px 0; }
        .download-btn { background: #3498db; color: white; border: none; padding: 8px 15px; cursor: pointer; }
        .download-btn:hover { background: #2980b9; }
        .status { margin: 10px 0; padding: 10px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
         body { font-family: Arial; margin: 0; padding: 20px; }
        nav { background: #2c3e50; padding: 10px; color: white; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        .container { max-width: 800px; margin: 20px auto; }
        .document { border: 1px solid #ddd; padding: 15px; margin: 10px 0; }
        .download-btn { background: #3498db; color: white; border: none; padding: 8px 15px; cursor: pointer; }
        .download-btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="downloads.html">Downloads</a>
        <a href="contact.html">Contact</a>
    </nav>
    <div class="container">
        <h1>Project Documents</h1>
        <div id="documents">
            <div class="document">
                <span>📄 Internship Guide</span>
                <button class="download-btn" onclick="downloadFile('Internship-Guide.pdf')">Download</button>
            </div>
            <div class="document">
                <span>📄 Project Alpha Documentation</span>
                <button class="download-btn" onclick="downloadFile('Project-Alpha-Documentation.pdf')">Download</button>
            </div>
            <div class="document">
                <span>📄 API Reference Manual</span>
                <button class="download-btn" onclick="downloadFile('API-Reference-Manual.pdf')">Download</button>
            </div>
            <div class="document">
                <span>📄 System Design Report</span>
                <button class="download-btn" onclick="downloadFile('System-Design-Report.pdf')">Download</button>
            </div>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const API_URL = 'https://x6ht4v0ow8.execute-api.us-east-1.amazonaws.com/prod/download';
        
        async function downloadFile(fileName) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status';
            
            try {
                // Show loading
                statusDiv.textContent = 'Generating secure download link...';
                statusDiv.className = 'status';
                
                // Request pre-signed URL
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ file_name: fileName })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate download link');
                }
                
                // Success - trigger download
                statusDiv.textContent = '✅ Download starting... Link valid for 5 minutes';
                statusDiv.className = 'status success';
                
                // Create temporary link and click it
                const link = document.createElement('a');
                link.href = data.url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
            } catch (error) {
                statusDiv.textContent = '❌ Error: ' + error.message;
                statusDiv.className = 'status error';
                console.error('Download error:', error);
            }
        }
    </script>
</body>
</html>
